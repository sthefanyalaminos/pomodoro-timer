<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <h1>Pomodoro Timer</h1>

        <ul class>
            <li><button>start</button></li>
            <li><button>pause</button></li>
            <li><button>reset</button></li>
        </ul>
    </header>

    <main>
        <article class="container_hours"></article>
        <article class="container_list"><h2>to-do list</h2></article>
        <article class="container_notes"><h2>notes</h2></article>
        <figure class="image">
            <img src="assets/images/night.png" alt="study partner">
        </figure>
    </main>

    <footer>
        <button>what is a pomodoro timer?</button>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
